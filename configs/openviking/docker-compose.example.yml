version: "3.8"

services:
  openviking:
    image: ghcr.io/volcengine/openviking:main
    container_name: ai-workflow-openviking
    ports:
      - "1933:1933"
    volumes:
      # Project-local config and data mount points.
      - ../../.runtime/openviking/ov.conf:/app/ov.conf
      - ../../.runtime/openviking/data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

