agents:
  claude:
    binary: claude
    default_max_turns: 30
  codex:
    binary: codex
    model: gpt-5.3-codex
    reasoning: high
    sandbox: workspace-write
    approval: never
  openspec:
    binary: openspec

pipeline:
  default_template: standard
  global_timeout: 2h
  auto_infer_template: true
  max_total_retries: 5

scheduler:
  max_global_agents: 3
  max_project_pipelines: 2

store:
  driver: sqlite
  path: ~/.ai-workflow/data.db

log:
  level: info
  file: ~/.ai-workflow/logs/app.log
  max_size_mb: 100
  max_age_days: 30
