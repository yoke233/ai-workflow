agents:
  claude:
    binary: claude
    default_max_turns: 30
    capabilities_max:
      fs_read: true
      fs_write: true
      terminal: true
  codex:
    binary: codex
    model: gpt-5.3-codex
    reasoning: high
    sandbox: workspace-write
    approval: never
    capabilities_max:
      fs_read: true
      fs_write: true
      terminal: true
  openspec:
    binary: openspec

roles:
  - name: secretary
    agent: codex
    prompt_template: secretary_system
    capabilities:
      fs_read: true
      fs_write: true
      terminal: true
    session:
      reuse: true
      prefer_load_session: true
  - name: worker
    agent: codex
    prompt_template: implement
    capabilities:
      fs_read: true
      fs_write: true
      terminal: true
    session:
      reuse: true
  - name: reviewer
    agent: codex
    prompt_template: code_review
    capabilities:
      fs_read: true
      fs_write: false
      terminal: false
    session:
      reuse: true
      reset_prompt: true
  - name: aggregator
    agent: codex
    prompt_template: review_aggregator
    capabilities:
      fs_read: true
      fs_write: false
      terminal: false
    session:
      reuse: true
      reset_prompt: true
  - name: plan_parser
    agent: codex
    prompt_template: plan_parser
    capabilities:
      fs_read: true
      fs_write: false
      terminal: false

role_bindings:
  secretary:
    role: secretary
  pipeline:
    stage_roles:
      requirements: worker
      implement: worker
      verify: reviewer
  review_orchestrator:
    reviewers:
      completeness: reviewer
      dependency: reviewer
      feasibility: reviewer
    aggregator: aggregator
  plan_parser:
    role: plan_parser

spec:
  enabled: false
  provider: noop
  on_failure: warn
  openspec:
    binary: openspec

pipeline:
  default_template: standard
  global_timeout: 2h
  auto_infer_template: true
  max_total_retries: 5

scheduler:
  max_global_agents: 3
  max_project_pipelines: 2

secretary:
  review_gate_plugin: review-ai-panel
  review_orchestrator:
    max_rounds: 2
  dag_scheduler:
    max_concurrent_tasks: 2

store:
  driver: sqlite
  path: ~/.ai-workflow/data.db

log:
  level: info
  file: ~/.ai-workflow/logs/app.log
  max_size_mb: 100
  max_age_days: 30
